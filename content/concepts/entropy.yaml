id: 10
slug: entropy

title:
  english: Entropy
  chinese_traditional: 熵
  zhuyin: ㄕㄤ

pronunciation:
  ipa: "/ˈɛntrəpi/"
  readable: "EN-truh-pee"

origin:
  language: Greek
  meaning: transformation

summary: >
  A measure of energy dispersal, uncertainty, or the number of possible microscopic arrangements in a system.

plain_english: >
  Entropy describes how many ways the parts of a system can be arranged while still looking the same at a larger scale.

memory_hook: >
  Entropy counts how many hidden arrangements fit the visible situation.

background:
  - >
    In thermodynamics, entropy helps explain why heat flows from hot objects to cold objects.
  - >
    In information theory, entropy measures uncertainty in a message or signal.

locations:
  - physics
  - information-theory

dates:
  - year: 1865
    event: Rudolf Clausius introduced the term entropy in thermodynamics.
  - year: 1948
    event: Claude Shannon applied entropy to information theory.

cause_effect:
  - cause: More possible microstates
    effect: Higher entropy
  - cause: Heat spreads through a system
    effect: Energy becomes less concentrated

technical: >
  Entropy is a state function that quantifies microscopic multiplicity in statistical mechanics and uncertainty in information theory.

compare:
  - concept: energy
    difference: Energy is conserved, while entropy describes how energy is distributed.

examples:
  - >
    Ice melting in a warm room increases entropy because water molecules can occupy more arrangements.

mistakes:
  - >
    Entropy does not simply mean disorder in every context.

quiz:
  questions:
    - type: qa
      prompt: What does entropy measure in information theory?
      answer: >
        It measures uncertainty or the average information content of a message.
    - type: cloze
      text: >
        Entropy increases when there are more possible {{c1::microstates}}.

compression:
  chinese: >
    熵衡量一個系統可能的＿＿＿數量。
  answer: 微觀排列
  english: >
    Entropy measures how many hidden arrangements can produce the same visible state.

relationships:
  - thermodynamics
  - information-theory
  - probability

