slug: a-priori

title:
  english: A Priori
  chinese_traditional: 先驗
  zhuyin: ㄒㄧㄢ ㄧㄢˋ

pronunciation:
  ipa: "/ˌɑː prɪˈɔːri/"
  readable: "ah pree-OR-ee"

origin:
  language: Latin
  meaning: from what comes before

summary: >
  A priori knowledge is knowledge that does not depend on specific experiences.

plain_english: >
  A priori knowledge is knowledge gained through reasoning rather than direct experience.
  Philosophers contrast it with a posteriori knowledge, which comes from observation
  and experience.

memory_hook: >
  A priori knowledge comes from thinking before experience.

background:
  - >
    The distinction between a priori and a posteriori knowledge became important
    in philosophy and epistemology.

  - >
    Medieval Scholastic philosophers debated how knowledge relates to experience
    and reasoning.

  - >
    Immanuel Kant later expanded the distinction and connected it to his theory
    of knowledge.

location:
  - europe
  - germany
  - philosophy
  - epistemology

dates:
  - year: 1200
    event: Medieval Scholastic debates helped shape the distinction

  - year: 1781
    event: Kant formalized the modern usage in Critique of Pure Reason

cause_effect:
  - cause: Knowledge derived from reasoning alone
    effect: Classified as a priori knowledge

  - cause: Knowledge derived from observation
    effect: Classified as a posteriori knowledge

technical: >
  In epistemology, a priori knowledge refers to knowledge that is justified
  independently of particular sensory experiences. It is contrasted with
  a posteriori knowledge, which depends on empirical observation.

compare:
  - concept: a-posteriori
    difference: A posteriori knowledge depends on experience and observation.

  - concept: empiricism
    difference: Empiricism emphasizes knowledge gained through experience.

  - concept: rationalism
    difference: Rationalism emphasizes reason as a source of knowledge.

examples:
  - >
    Mathematical truths are often considered examples of a priori knowledge.

  - >
    "All bachelors are unmarried" is commonly treated as an a priori statement.

mistakes:
  - >
    A priori does not simply mean "obvious" or "innate."

  - >
    Not all philosophers agree on which kinds of knowledge are truly a priori.

quiz:
  questions:

    - type: qa
      prompt: What distinguishes a priori knowledge from a posteriori knowledge?
      answer: >
        A priori knowledge is independent of experience, while a posteriori
        knowledge depends on experience and observation.

    - type: qa
      prompt: Why is Immanuel Kant important to the concept of a priori knowledge?
      answer: >
        Kant formalized the modern distinction between a priori and
        a posteriori knowledge in his theory of knowledge.

    - type: cloze
      text: >
        The Latin phrase a priori means from what comes [before].

    - type: cloze
      text: >
        Empiricism emphasizes knowledge gained through [experience].

    - type: cloze
      text: >
        Medieval [Scholastic] philosophers debated how knowledge relates to
        experience and reasoning.

compression:
  chinese: >
    ＿＿＿知識不依賴感官經驗，而是透過理性推導形成。

  answer: 先驗

  english: >
    A priori knowledge is knowledge gained independently of particular experience.

