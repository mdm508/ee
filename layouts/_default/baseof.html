<!doctype html>
<html lang="{{ site.Language.LanguageCode }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.Params.description }}">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
    {{ with resources.Get "css/main.css" }}
      {{ $css := . | minify | fingerprint }}
      <link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}">
    {{ end }}
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ site.Home.RelPermalink }}">{{ site.Title }}</a>
      <nav aria-label="Primary">
        <a href="{{ relref . "/concepts" }}">Concepts</a>
        <a href="{{ site.Params.repository }}">GitHub</a>
      </nav>
    </header>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    <footer class="site-footer">
      <p>YAML-first semantic learning content rendered by Hugo.</p>
    </footer>
    {{ with resources.Get "js/cloze.js" }}
      {{ $js := . | minify | fingerprint }}
      <script src="{{ $js.RelPermalink }}" integrity="{{ $js.Data.Integrity }}"></script>
    {{ end }}
  </body>
</html>
